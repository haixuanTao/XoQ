[package]
name = "xoq-chat"
version = "0.1.0"
edition = "2021"
description = "MoQ chat client for Python — interoperable with browser chat"
license = "Apache-2.0"

[lib]
name = "xoq_chat"
crate-type = ["cdylib"]

[dependencies]
xoq = { path = "../..", features = ["chat"] }
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py38"] }
